<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>35 ice cream -MH-</title>
    <link rel="stylesheet" href="style0221.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div class="body">
        <table id="modeSwitch">
            <thead>
                <tr>
                    <th><button id="calButton">カレンダー</button></th>
                    <th><button id="paymentDetailButton" type="button">変動費履歴</button></th>
                    <th><button id="fixedCostButton" type="button">固定費</button></th>
                </tr>
            </thead>
        </table>

        <div id="iosPrompt" style="display:none;" class="iosPrompt">
            iPhoneの場合、Safariの共有ボタンから「ホーム画面に追加」を選んでください
        </div>

        <div id="month">
            <button id="prev">前月</button>
            <span id="currentMonth">2025年1月</span>
            <button id="next">翌月</button>
        </div>

        <div id="calendarWrapper"></div><!--component html-->

        <div id="budgetTable2" class="budgetTable"></div><!--component html-->

        <div id="appName">
        35 ice cream -MH-
        </div>
        <div class="version">
            ver 0.230
            <button id="updateButton">最新版に更新</button>
        </div>
        <div id="develop">
            <button id="showLogButton">開発用ログ見る</button>
            <button id="clearCacheButton">開発用キャッシュ削除</button>
        </div>

        <div id="dialogOverlay" class="hidden"></div>

        <div id="budgetDialogOverlay" class="hidden">
            <div id="budgetInputDialog">
                <button id="budgetCancelBtn">キャンセル</button>
                <input type="text" id="budgetAmountInput" placeholder="金額" inputmode="numeric">
                <button id="budgetSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>

</html>
